[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
# Mesmo comando que nixpacks.toml [start] (Railway pode usar este valor no runtime).
startCommand = "/bin/sh -c 'set -e; npx prisma migrate deploy; exec env HOSTNAME=0.0.0.0 node .next/standalone/server.js'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
