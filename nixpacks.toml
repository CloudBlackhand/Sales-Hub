# Railway / Nixpacks — Next 16 e Prisma 7 exigem Node ≥ 20.19 (logs mostravam Node 18).
[variables]
NIXPACKS_NODE_VERSION = "22"

# O CMD da imagem vem daqui; sem isso o Nixpacks usa um start sem HOSTNAME=0.0.0.0 e o healthcheck da Railway falha (503).
# O server.js standalone faz: hostname = process.env.HOSTNAME || "0.0.0.0" — no Docker, HOSTNAME é o ID do container.
[start]
cmd = "/bin/sh -c 'set -e; npx prisma migrate deploy; exec env HOSTNAME=0.0.0.0 node .next/standalone/server.js'"
